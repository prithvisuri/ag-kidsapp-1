
version: '3.8'
services:
  web:
    build: .
    ports:
      - "8080:80"
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: "http web:80"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - 4040:4040
    depends_on:
      - web
